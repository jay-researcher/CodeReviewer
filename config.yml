app:
  report:
    language: zh-CN
    min_severity: Medium
    detail_level: detailed
    group_by_responsible: true
    history_days: 14
    finding_diff_max_chars: 4000
    finding_diff_total_chars: 500000
    diff_file_max_chars: 120000
    diff_total_chars: 3000000
    markdown_hard_max_chars: 12000000
    history_diff_file_max_chars: 20000
    history_diff_total_chars: 1000000
  web:
    users:
      admin:
        role: manager
      root:
        role: manager
      gerhard.guo:
        role: developer
        responsible: [wen.yi]
      bryan.tan:
        role: developer
        responsible: [wen.yi]
      vincentgr.wang:
        role: developer
        responsible: [kevin.tan]
      kelvinh.wu:
        role: developer
        responsible: [kevin.tan]
  review_workflow:
    blocking_severities: [Critical, High]
    require_rescan_for_fixed: true
    follow_up_unblocks_blocking: false
    manager_override_enabled: true
    manual_pass_roles: [auditor, manager]
    not_issue_approval_roles: [auditor, manager]
  review:
    framework: auto
    template_path: D:/TTL/vibe-coding/CodeReviewer/docs/ECHNL-5539.md
    template_max_chars: 6000
    jira_allowed_statuses:
      - Development Done
    mr_states:
      - opened
      - merged
    mr_limit: 200
    issue_branch_limit: 200
    ignored_branch_types:
      # Legacy compatibility list. New reviews use release_gate.branch_prefixes
      # so version-suffixed branches such as DPS11_Config-<version> are routed
      # correctly instead of being passed to ordinary Jira issue review.
      - COMPANY_CONFIG
      - DPS11_Config
      - DPS9_Config
      - WVAdmin_Config
    release_gate:
      enabled: true
      # GIT_VERSION is a release-level MR and must be reviewed as one explicit
      # MR, never folded into an ordinary Jira/Sprint consolidated review.
      git_version_review_mode: mr
      deferred_roles:
        - company_config
        - scr
      branch_prefixes:
        company_config:
          - COMPANY_CONFIG
          - DPS11_CONFIG
          - DPS9_CONFIG
          - WVADMIN_CONFIG
        scr:
          - SCR
          - DPS11_SCR
          - DPS9_SCR
        git_version:
          - GIT_VERSION
          - DPS11_GIT_VERSION
          - DPS9_GIT_VERSION
      dps_build_script_path: company/SV/script/DPSBuild.php
      dps_db_parser_path: company/SV/script/DBChangeParser.php
      dps_db_config_path: company/SV/script/db_change.yml
    auto_chunk: true
    chunk_mr_limit: 0
    # Chunk only when the pre-trim prompt approaches the 160K hard budget.
    # Prompts that can be safely compacted to prompt_target_chars stay as one
    # end-to-end review, avoiding repeated LLM calls for every DPS project.
    chunk_prompt_threshold_chars: 120000
    chunk_prompt_threshold_ratio: 0.75
    chunk_near_budget_max_mrs_per_chunk: 2
    chunk_max_mrs_per_chunk: 3
    discovery:
      gitlab_search_fallback: true
      history_discovery: true
      history_limit: 100
      branch_discovery: true
      branch_discovery_mode: missing-only
      filter_to_projects: true
      jira_remote_link: true
      jira_dev_panel: true
      branch_project_limit: 200
      branch_search_limit: 20
      branch_mr_limit: 20
      extra_gitlab_projects: []
  jira:
    project_key: ECHNL
    spaces:
      - SVREQ
      - ECHNL
      - CORE
    sprint_prefixes:
      SVREQ: SVREQ Sprint
      ECHNL: e-Channel Sprint
      CORE: Core Sprint
    filter_max_issues: 500
  jira_prd:
    context: auto
    auto_fetch: true
    fetch_depth: 2
    fetch_timeout_seconds: 240
    context_max_chars: 20000
    context_per_issue_chars: 6000
    context_max_issues: 8
  llm:
    provider: auto
    network_mode: direct
    #codex_model: gpt-5.5
    codex_model: gpt-5.6-sol # deepest reasoning for release reviews
    #codex_model: gpt-5.6-luna # instant reply
    #codex_model: gpt-5.6-terra # balanced
    cc_switch_provider: Claude code opus
    timeout_seconds: 180
    codex_timeout_seconds: 300
    codex_ignore_user_config: true
    codex_force_http: true
    # Local CodeReviewer uses CLIProxyAPI's OpenAI-compatible Responses API.
    # Keep the credential outside the repository in OPENAI_API_KEY.
    codex_http_base_url: http://127.0.0.1:8318/v1
    codex_http_api_key_env: OPENAI_API_KEY
    codex_stream_max_retries: 2
    max_retries: 3
    # DPS reviews cannot fall back to another provider. One bounded Codex
    # attempt avoids repeating the same 300-second request after a hard timeout.
    dps_codex_max_retries: 1
    max_tokens: 3000
    max_diff_chars: 60000
    # GIT_VERSION reviews already have deterministic YAML/lock validation and
    # locked-repository summaries. Keep their LLM request focused so the deep
    # release model does not spend its timeout rereading repetitive build data.
    git_version_max_diff_chars: 20000
    git_version_prompt_target_chars: 45000
    git_version_prompt_max_chars: 60000
    git_version_prompt_hard_max_chars: 60000
    git_version_prompt_min_context_chars: 16000
    git_version_prompt_min_diff_chars: 8000
    optimize_web_resources: true
    resource_diff_max_chars: 4000
    resource_diff_total_chars: 16000
    resource_diff_added_line_limit: 80
    #reasoning_effort: xhigh # Extra High
    #reasoning_effort: ultra # Ultra
    reasoning_effort: high #default
    required_reasoning_effort: medium 
    speed: standard # default
    #speed: fast # switch when urgent to deliver
    required_speed: standard
    require_success: true
    require_structured_output: true
    dps_require_codex: true
    prompt_target_chars: 90000
    prompt_max_chars: 160000
    prompt_hard_max_chars: 160000
    prompt_over_budget: trim
    prompt_min_diff_chars: 30000
    prompt_min_project_context_chars: 12000
    prompt_min_jira_prd_context_chars: 8000
    prompt_min_git_version_context_chars: 12000
  local_context:
    auto: true
    prefer_local_mr_diff: true
    local_diff_timeout_seconds: 120
    local_diff_fetch_timeout_seconds: 120
    local_diff_cache_max_entries_per_project: 200
    repository_sync_required: true
    # High-signal context: changed files, direct dependencies and Drupal
    # descriptors. Codebase Memory supplies bounded architecture/graph detail.
    project_context_max_chars: 32000
    consolidated_project_context_max_chars: 40000
    project_context_max_tree_files: 120
    project_context_max_selection_files: 3000
    project_context_max_file_chars: 6000
    project_context_max_dependency_files: 6
    project_context_max_sibling_files: 2
    optimize_web_resources: true
    resource_context_file_max_chars: 1200
    workspace_roots:
      - D:/TTL/wvplaform
      - D:/TTL/vibe-coding
    workspace_scan_max_depth: 5
    codebase_memory_enabled: true
    codebase_memory_persistence: true
    codebase_memory_status_timeout_seconds: 15
    codebase_memory_skip_project_patterns:
      - web-sv-build
    codebase_memory_index_mode: moderate
    # A cross-process lock prevents parallel memory-heavy indexers.
    codebase_memory_timeout_seconds: 120
    codebase_memory_max_repository_files: 50000
    codebase_memory_query_timeout_seconds: 60
    codebase_memory_checkout_timeout_seconds: 30
    codebase_memory_context_max_chars: 4000
    codebase_memory_change_context_max_chars: 6000
    codebase_memory_max_changed_files: 12
  git_tools:
    groups: []
    require_mr_match: false
  git_version:
    deep_review: true
    compare_previous: true
    source_review_max_repos: 30
    source_review_max_files_per_repo: 80
    source_diff_context_max_chars: 100000

